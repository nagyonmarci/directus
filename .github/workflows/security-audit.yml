name: Automated Security Audit

# Runs weekly and on demand.
# A pull request is only opened when explicitly requested via workflow_dispatch
# (create_pr: true) — scheduled runs push to a branch only.
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Open a pull request with the generated audit report'
        type: boolean
        default: false

permissions: read-all

jobs:
  audit:
    name: Generate security audit
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the audit branch
      pull-requests: write # create PR (only when create_pr: true)
      issues: read # gh issue list in collect.mjs
      security-events: read # secret-scanning alerts in collect.mjs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Helm is used by collect.mjs to run `helm lint`
      - name: Install Helm
        run: |
          curl -fsSL https://baltocdn.com/helm/signing.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/helm.gpg > /dev/null
          sudo apt-get install -y apt-transport-https
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/helm.gpg] \
            https://baltocdn.com/helm/stable/debian/ all main" \
            | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list
          sudo apt-get update -qq
          sudo apt-get install -y helm
          helm version --short

      # zizmor: static analysis of GitHub Actions workflows
      # https://github.com/woodruffw/zizmor
      # TODO: pin to an exact version once the initial version is confirmed:
      #   pip install zizmor==X.Y.Z
      - name: Install zizmor
        run: pip install --quiet zizmor

      - name: Install audit script dependencies
        run: npm install --prefix scripts/audit --silent

      # Writes audit-context.json to the repo root.
      # GH_TOKEN lets the gh CLI call the GitHub API for issues/PRs.
      - name: Collect security context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/audit/collect.mjs

      # Reads audit-context.json, calls the Claude API, and writes
      # docs/security/audit-YYYY-MM-DD.md.
      # Requires ANTHROPIC_API_KEY to be stored as a repository secret.
      - name: Generate audit report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/audit/generate.mjs

      # Always pushes the report to a dated branch.
      # A PR is only opened in the next step when create_pr: true.
      - name: Commit report to branch
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="security-audit/${DATE}"
          REPORT="docs/security/audit-${DATE}.md"

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git checkout -b "$BRANCH"
          git add "$REPORT"

          if git diff --staged --quiet; then
            echo "Report unchanged — nothing to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "docs: automated security audit ${DATE}"
          git push origin "$BRANCH"
          echo "pushed=true"   >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: ${{ inputs.create_pr == true && steps.commit.outputs.pushed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.commit.outputs.branch }}" \
            --title "Security Audit — $(date -u +%Y-%m-%d)" \
            --body "$(cat <<'BODY'
          ## Automated Security Audit

          Generated by the [security-audit](.github/workflows/security-audit.yml) workflow.

          **Auditor:** Claude Opus (AI-assisted static analysis + live GitHub context)
          **Trigger:** `workflow_dispatch` with `create_pr: true`

          Review `${{ steps.commit.outputs.report }}` and resolve any new findings before merging.
          BODY
          )"
